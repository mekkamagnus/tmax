name: smoke (runner self-test)
description: |
  Runner self-test: exercises every matcher type, the ${VAR} templating, the
  boolean idiom, and the per-step wait field. Not run by default (the runner
  skips _-prefixed playbooks) — invoke explicitly:
    bun adws/adw-run-e2e.ts adws/playbooks/_smoke.yaml

setup:
  - action: setup_file
    var: FILE
    name: _smoke-fixture.txt
    content: |
      alpha
      beta
      gamma

steps:
  - name: mode is fundamental (no major mode)
    eval: '(major-mode-get)'
    expect:
      result_contains: ""

  - name: cursor_line matcher after setup_cursor
    setup_cursor: [2, 0]
    eval: '(cursor-line)'
    expect:
      result_contains: "2"

  - name: cursor_column matcher
    setup_cursor: [1, 2]
    eval: '(cursor-column)'
    expect:
      result_contains: "2"

  - name: line_text matcher (exact)
    setup_cursor: [0, 0]
    eval: '(buffer-get-line (cursor-line))'
    expect:
      result_contains: "alpha"

  - name: line_text_matches matcher (regex)
    setup_cursor: [2, 0]
    eval: '(buffer-get-line (cursor-line))'
    expect:
      result_contains: "gam"

  - name: buffer_contains matcher
    eval: '(buffer-text)'
    expect:
      result_contains: "beta"

  - name: boolean idiom — arithmetic truthiness via result_contains
    eval: '(if (= (+ 1 1) 2) "ACTIVE" "INACTIVE")'
    expect:
      result_contains: "ACTIVE"

  - name: boolean idiom — false branch
    eval: '(if (= (+ 1 1) 3) "ACTIVE" "INACTIVE")'
    expect:
      result_contains: "INACTIVE"

  - name: keys drive real dispatch (h moves cursor left)
    setup_cursor: [0, 2]
    keys: "h"
    wait: 60
  - name: ...then assert cursor moved to column 1
    eval: '(cursor-column)'
    expect:
      result_contains: "1"

cleanup: true
