name: vim-parity-edit
description: |
  SPEC-067 Track 3 — edit-parity e2e. Drives every core vim normal-mode
  EDIT operation through the real daemon/client keypress path and asserts
  the resulting buffer text + cursor after each: x / . (repeat) / ~ / r / R
  (replace mode) / >> / << / yy + p / dd / J / C-a / C-x (incl. count).

  Uses `keys:` exclusively so the binding → dispatch → command path is
  exercised end-to-end. Position is seeded per-step via `setup_cursor`
  (a (cursor-move) primitive) so the tested key stays a real keypress.

setup:
  - action: setup_file
    var: FILE
    name: vim-parity-edit.txt
    content: |
      hello world
      foo bar baz
        indented line
      count 42 end

terminal:
  height: 24
  width: 80

steps:
  - name: switch to normal mode
    eval: '(editor-set-mode "normal")'
    expect:
      mode: normal

  - name: open the test file
    eval: '(find-file "${FILE}")'
    expect:
      buffer_contains: "hello world"

  # -- x (delete char) + . (repeat) on line 0 --
  - name: x deletes char under cursor (ello world)
    keys: "x"
    setup_cursor: [0, 0]
    expect:
      cursor_line: 0
      line_text: "ello world"

  - name: dot repeats x (llo world)
    keys: "."
    expect:
      cursor_line: 0
      line_text: "llo world"

  # -- ~ toggle case + advance --
  - name: tilde toggles case and advances (Llo world)
    keys: "~"
    setup_cursor: [0, 0]
    expect:
      cursor_line: 0
      cursor_column: 1
      line_text: "Llo world"

  # -- r{char} replace single char --
  - name: r replaces char at cursor (LZo world)
    keys: "rZ"
    setup_cursor: [0, 1]
    expect:
      cursor_line: 0
      cursor_column: 1
      line_text: "LZo world"

  # -- R replace mode on line 1 --
  - name: R enters replace mode
    keys: "R"
    setup_cursor: [1, 0]
    expect:
      mode: replace

  - name: typing in R overwrites chars (XYo bar baz)
    keys: "XY"
    expect:
      cursor_line: 1
      cursor_column: 2
      line_text: "XYo bar baz"

  - name: Escape exits replace mode
    keys: "<Escape>"
    expect:
      mode: normal

  # -- >> indent (line 2 has 2 leading spaces -> 4). Asserted via the
  #    first-non-blank column, since the daemon eval transport strips
  #    leading whitespace from returned strings (line_text can't see it). --
  - name: indent line (cursor reset to col 0)
    keys: ">>"
    setup_cursor: [2, 0]
    expect:
      cursor_line: 2
      cursor_column: 0

  - name: first non-blank now at col 4 (proves 2-space indent added)
    keys: "_"
    expect:
      cursor_line: 2
      cursor_column: 4

  # -- << outdent (4 leading spaces -> 2) --
  - name: outdent line (cursor reset to col 0)
    keys: "<<><<>"
    setup_cursor: [2, 0]
    expect:
      cursor_line: 2
      cursor_column: 0

  - name: first non-blank back at col 2 (proves outdent removed 2)
    keys: "_"
    expect:
      cursor_line: 2
      cursor_column: 2

  # -- yy + p (yank line 0, paste below) --
  - name: yy yanks current line (buffer unchanged)
    keys: "yy"
    setup_cursor: [0, 0]
    expect:
      cursor_line: 0
      buffer_contains: "LZo world"

  - name: p pastes the yanked line below (cursor on new line)
    keys: "p"
    expect:
      cursor_line: 1
      line_text: "LZo world"

  # -- dd delete the pasted line, restoring single line 1 --
  - name: dd deletes current line (back to XYo bar baz)
    keys: "dd"
    setup_cursor: [1, 0]
    expect:
      cursor_line: 1
      line_text: "XYo bar baz"

  # -- J join line 1 with line 2. Cursor lands at the join (col = len of
  #    first line); buffer_contains proves the second line's text merged in. --
  - name: J joins current line with next
    keys: "J"
    setup_cursor: [1, 0]
    expect:
      cursor_line: 1
      cursor_column: 11
      buffer_contains: "indented line"

  # -- C-a / C-x / 5C-a on the number line --
  - name: C-a increments 42 to 43
    keys: "<C-a>"
    setup_cursor: [2, 0]
    expect:
      cursor_line: 2
      cursor_column: 7
      line_text: "count 43 end"

  - name: C-x decrements 43 back to 42
    keys: "<C-x>"
    setup_cursor: [2, 0]
    expect:
      cursor_line: 2
      cursor_column: 7
      line_text: "count 42 end"

  - name: count C-a (5C-a) increments by 5 to 47
    keys: "5<C-a>"
    setup_cursor: [2, 0]
    expect:
      cursor_line: 2
      cursor_column: 7
      line_text: "count 47 end"

cleanup: true
