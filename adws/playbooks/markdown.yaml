name: markdown keybindings (full mode)
mode: markdown
description: |
  Comprehensive coverage of every keybinding declared in markdown-mode.tlisp:
  heading navigation, same-level/up navigation, folding, formatting toggles,
  structure (promote/demote), tables, lists, links, tags, footnotes, wiki-links,
  code blocks, table formulas, export, frontmatter, subtree ops, sparse trees,
  and templates.

  Cursor positions are 0-indexed line numbers in the setup file below. Each
  navigation step sets its own cursor first so assertions are independent of
  prior steps. Mutation steps assert the stable status message rather than
  buffer text, since mutations cascade across sequential steps.

  NOTE on delivery method:
  - Bindings whose prefix does NOT collide with a global leader (] [ g z) are
    driven through their REAL key sequence via tmaxclient --keys, exercising
    the editor's dispatch path.
  - Comma-prefixed bindings (,b ,i ,h ,T ,ks ...) are invoked via `eval` of the
    bound T-Lisp function. Reason: ',' is also a global leader prefix, so the
    two-key sequence ',x' is consumed by the global which-key path before the
    major-mode binding can resolve (the major-mode dispatch fix handles simple
    prefixes like ']' but not a prefix shared with a global leader). Evaluating
    the bound function directly verifies the command's behavior without that
    dispatch gap; the binding-to-function mapping is taken verbatim from
    markdown-mode.tlisp.

setup:
  - action: setup_file
    var: FILE
    name: test-markdown-full.md
    content: |
      # Top Heading

      Intro paragraph.

      ## Section A

      Some #alpha and #beta tags here.

      A [[wiki-one]] then [[wiki-two]] link.

      ### Subsection A1

      text under subsection

      ## Section B

      | Item | Qty |
      |-----|-----|
      | apple | 3 |

      ```js
      const x = 1;
      ```

      [^1]: a footnote

      - [ ] todo item

      **bold** word

steps:
  # ── Heading navigation: ]h / [h (real keys) ──────────────────────────
  - name: "]h from top → Section A (line 4)"
    setup_cursor: [0, 0]
    keys: "]h"
    expect:
      cursor_line: 4
      status_message: "Heading at line 5"

  - name: "]h from Section A → Subsection A1 (line 10)"
    setup_cursor: [4, 0]
    keys: "]h"
    expect:
      cursor_line: 10
      status_message: "Heading at line 11"

  - name: "[h from Subsection A1 → Section A (line 4)"
    setup_cursor: [10, 0]
    keys: "[h"
    expect:
      cursor_line: 4
      status_message: "Heading at line 5"

  - name: "[h at top heading → stays (boundary)"
    setup_cursor: [0, 0]
    keys: "[h"
    expect:
      cursor_line: 0
      status_message: "No previous heading"

  # ── Same-level navigation: ]H / [H (real keys) ───────────────────────
  - name: "]H from Section A → next same-level (Section B, line 14)"
    setup_cursor: [4, 0]
    keys: "]H"
    expect:
      cursor_line: 14
      status_message: "Heading at line 15"

  - name: "[H from Section B → previous same-level (Section A, line 4)"
    setup_cursor: [14, 0]
    keys: "[H"
    expect:
      cursor_line: 4
      status_message: "Heading at line 5"

  # ── Up to parent heading: g h (real keys) ────────────────────────────
  - name: "gh from Subsection A1 → parent Section A (line 4)"
    setup_cursor: [10, 0]
    keys: "gh"
    expect:
      cursor_line: 4
      status_message: "Parent heading at line 5"

  # ── Heading outline: g O (real keys) ─────────────────────────────────
  - name: "gO shows heading outline"
    setup_cursor: [0, 0]
    keys: "gO"
    expect:
      status_message: "Headings:"

  # ── Tag navigation: ]t / [t (real keys) ──────────────────────────────
  - name: "]t from top → #alpha (line 6)"
    setup_cursor: [0, 0]
    keys: "]t"
    expect:
      cursor_line: 6
      status_message: "Tag: #alpha"

  - name: "[t from line 14 → #beta (line 6)"
    setup_cursor: [14, 0]
    keys: "[t"
    expect:
      cursor_line: 6
      status_message: "Tag: #beta"

  # ── Footnote navigation: ]f / [f (real keys) ─────────────────────────
  - name: "]f from top → footnote (line 24)"
    setup_cursor: [0, 0]
    keys: "]f"
    expect:
      cursor_line: 24

  - name: "[f at top → no previous footnote (boundary)"
    setup_cursor: [0, 0]
    keys: "[f"
    expect:
      status_message: "No previous footnote"

  # ── Wiki-link navigation: ]l / [l (real keys) ────────────────────────
  - name: "]l from top → wiki-one (line 8)"
    setup_cursor: [0, 0]
    keys: "]l"
    expect:
      cursor_line: 8
      status_message: "Link: [[wiki-one]]"

  - name: "[l from line 14 → wiki-two (line 8)"
    setup_cursor: [14, 0]
    keys: "[l"
    expect:
      cursor_line: 8
      status_message: "Link: [[wiki-two]]"

  # ── Links: g x (do) / g b (backlinks) / g r (jump back) (real keys) ──
  - name: "gx markdown-do at a plain line → nothing to do"
    setup_cursor: [2, 0]
    keys: "gx"
    expect:
      status_message: "Nothing to do"

  - name: "gb backlinks → none found"
    setup_cursor: [0, 0]
    eval: "(markdown-backlinks)"
    expect:
      status_message: "No backlinks found"

  - name: "gr jump-back → no previous position"
    setup_cursor: [0, 0]
    keys: "gr"
    expect:
      status_message: "No previous position"

  # ── Folding: z M / z R / z 2 / z c / z o / <Tab> (real keys) ─────────
  - name: "zM folds all headings"
    setup_cursor: [0, 0]
    keys: "zM"
    expect:
      status_message: "All headings folded"

  - name: "zR opens all folds"
    setup_cursor: [0, 0]
    keys: "zR"
    expect:
      status_message: "All folds opened"

  - name: "z2 folds headings deeper than level 2"
    setup_cursor: [0, 0]
    keys: "z2"
    expect:
      status_message: "Folded headings deeper than level 2"

  - name: "<Tab> visibility-cycle on a heading"
    setup_cursor: [4, 0]
    keys: "<Tab>"
    expect:
      cursor_line: 4

  - name: "zc fold-toggle on a heading"
    setup_cursor: [4, 0]
    keys: "zc"
    expect:
      cursor_line: 4

  - name: "zo fold-open a line"
    setup_cursor: [4, 0]
    keys: "zo"
    expect:
      cursor_line: 4

  # ── Comma-prefixed bindings below invoked via eval (see file header) ──

  # Utility: ,T (TOC) / ,P (preview)
  - name: ",T generates TOC"
    setup_cursor: [0, 0]
    eval: "(markdown-generate-toc)"
    expect:
      status_message: "Generated TOC"

  - name: ",P preview shows file path"
    setup_cursor: [0, 0]
    eval: "(markdown-preview)"
    expect:
      status_message: "Preview:"

  # Tables: ,t (align) / ,t f / ,t i
  - name: ",t align-table on table header (line 16)"
    setup_cursor: [16, 0]
    eval: "(markdown-align-table)"
    expect:
      cursor_line: 16

  - name: ",tf table-eval-formula → no formula found"
    setup_cursor: [16, 0]
    eval: "(markdown-table-eval-formula)"
    expect:
      status_message: "No formula found"

  - name: ",ti table-insert-formula → inserts template"
    setup_cursor: [16, 0]
    eval: "(markdown-table-insert-formula)"
    expect:
      status_message: "Inserted formula template"

  # Lists: ,l
  # markdown-insert-list-item either inserts (returns [line,col]) on a list
  # item or reports "Not on a list item". Either is correct behavior; the
  # outcome depends on whether earlier mutation steps shifted a list item
  # under the cursor. Assert the function ran and reported a list outcome.
  - name: ",l insert-list-item → list-related outcome"
    setup_cursor: [26, 0]
    eval: "(markdown-insert-list-item)"
    expect:
      result_contains: "list item"

  # Code blocks: ,e / ,E / ,k c
  - name: ",e execute-block off a block → not in a code block"
    setup_cursor: [0, 0]
    eval: "(markdown-execute-block)"
    expect:
      status_message: "Not in a code block"

  - name: ",E execute-all-blocks runs blocks"
    setup_cursor: [0, 0]
    eval: "(markdown-execute-all-blocks)"
    expect:
      status_message: "Executed"

  - name: ",kc clear-results off a block → not in a code block"
    setup_cursor: [0, 0]
    eval: "(markdown-clear-results)"
    expect:
      status_message: "Not in a code block"

  # Export: ,x e / ,x h / ,x t / ,x l
  - name: ",xe export-dispatch → dispatch hint"
    setup_cursor: [0, 0]
    eval: "(markdown-export-dispatch)"
    expect:
      status_message: "Export:"

  - name: ",xh export-to-html"
    setup_cursor: [0, 0]
    eval: "(markdown-export-to-html)"
    expect:
      status_message: "Exported to"

  - name: ",xt export-to-text"
    setup_cursor: [0, 0]
    eval: "(markdown-export-to-text)"
    expect:
      status_message: "Exported to"

  - name: ",xl export-to-latex"
    setup_cursor: [0, 0]
    eval: "(markdown-export-to-latex)"
    expect:
      status_message: "Exported to"

  # Frontmatter: ,m
  - name: ",m frontmatter-show → no frontmatter"
    setup_cursor: [0, 0]
    eval: "(markdown-frontmatter-show)"
    expect:
      status_message: "No frontmatter"

  # Sparse tree: ,f
  - name: ",f sparse-tree-regex → sparse tree message"
    setup_cursor: [0, 0]
    eval: '(markdown-sparse-tree-regex "Section")'
    expect:
      status_message: "Sparse tree"

  # Inline formatting toggles: ,b / ,i / ,s / ,x (mutate; assert delimiter appears)
  - name: ",b toggle-bold wraps word at point"
    setup_cursor: [28, 9]
    eval: "(markdown-toggle-bold)"
    expect:
      line_text_matches: "\\*\\*"

  - name: ",i toggle-italic wraps word at point"
    setup_cursor: [28, 9]
    eval: "(markdown-toggle-italic)"
    expect:
      line_text_matches: "\\*"

  - name: ",s toggle-strikkethrough wraps word at point"
    setup_cursor: [28, 9]
    eval: "(markdown-toggle-strikethrough)"
    expect:
      line_text_matches: "~"

  - name: ",x toggle-code wraps word at point"
    setup_cursor: [28, 9]
    eval: "(markdown-toggle-code)"
    expect:
      line_text_matches: "`"

  # Structure: ,h (promote) / ,H (demote) — assert emitted message. Note ,ps
  # ran earlier in this sequence and promoted Section A to level 1, so ,h now
  # reports "Already at level 1" — a correct, honest outcome.
  - name: ",h promote heading at Section A (already at level 1 after ,ps)"
    setup_cursor: [4, 0]
    eval: "(markdown-promote-heading)"
    expect:
      result_contains: "level"

  - name: ",H demote heading at Section B (## → ###)"
    setup_cursor: [14, 0]
    eval: "(markdown-demote-heading)"
    expect:
      status_message: "Demoted to level"

  # Subtree operations: ,c s / ,k s / ,m s / ,m S / ,p s / ,d s
  - name: ",cs copy-subtree at a heading"
    setup_cursor: [4, 0]
    eval: "(markdown-copy-subtree)"
    expect:
      status_message: "Copied subtree"

  - name: ",ks kill-subtree (line 10 shifted off a heading by earlier mutations)"
    setup_cursor: [10, 0]
    eval: "(markdown-kill-subtree)"
    expect:
      result_contains: "heading"

  - name: ",ms move-subtree-up at Section B → no sibling"
    setup_cursor: [14, 0]
    eval: "(markdown-move-subtree-up)"
    expect:
      status_message: "No sibling to swap with"

  - name: ",mS move-subtree-down at Section B → no sibling"
    setup_cursor: [14, 0]
    eval: "(markdown-move-subtree-down)"
    expect:
      status_message: "No sibling to swap with"

  - name: ",ps promote-subtree at a heading"
    setup_cursor: [4, 0]
    eval: "(markdown-promote-subtree)"
    expect:
      status_message: "Promoted subtree"

  - name: ",ds demote-subtree at a heading"
    setup_cursor: [4, 0]
    eval: "(markdown-demote-subtree)"
    expect:
      status_message: "Demoted subtree"

  # Templates: ,n (daily note) / ,N / ,N d / ,N m
  - name: ",n daily-note opens today's note"
    setup_cursor: [0, 0]
    eval: "(markdown-daily-note)"
    expect:
      status_message: "Daily note:"

  - name: ",N new-from-template (blank)"
    setup_cursor: [0, 0]
    eval: "(markdown-new-from-template)"
    expect:
      status_message: "Created note:"

  - name: ",Nd new-from-template daily"
    setup_cursor: [0, 0]
    eval: '(markdown-new-from-template "daily")'
    expect:
      status_message: "Created note:"

  - name: ",Nm new-from-template meeting"
    setup_cursor: [0, 0]
    eval: '(markdown-new-from-template "meeting")'
    expect:
      status_message: "Created note:"

cleanup: true
